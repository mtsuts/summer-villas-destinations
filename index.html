<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destinations that deliver - Ibiza summer villas</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class='main-container'>
    <div class="hero-section">
      <div class="hero-section-content">
        <img src="./images/logo.svg" alt="Ibiza summer villas logo" class="logo" />
        <h1 class="hero-section-title"> Destinations that deliver</h1>
        <p class="hero-section-description"> Discover where your travel spend truly pays off in quality,
          <br /> enjoyment, and unforgettable experiences.
        </p>
      </div>
    </div>
    <section class="search-section" aria-label="Search and filters">
      <div class="search-bar">
        <svg class="search-bar__icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <circle cx="7.5" cy="7.5" r="5.75" stroke="currentColor" stroke-width="1.5" />
          <path d="M12 12L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        <input type="search" placeholder="Search locations" class="search-bar__input" id="search-input" />
      </div>
    </section>

    <section class="table-section" aria-label="Destination rankings">
      <div id="table" class="table-grid"></div>
    </section>

  </div>
  <script src="./table.js"> </script>
  <script src="./main.js"></script>
</body>

</html>
